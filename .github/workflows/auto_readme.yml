name: Auto-Generate Bookmarklet READMEs

on:
  push:
    branches:
      - main
    paths:
      - '*.js'

jobs:
  # ── Job 1: Detect which bookmarklet JS files were added or modified ───────
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has_changes: ${{ steps.set-matrix.outputs.has_changes }}
    steps:
      - name: Checkout (with history for diff)
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Find changed bookmarklet JS files
        id: set-matrix
        run: |
          # For the initial commit there is no HEAD~1; fall back to the empty tree.
          if git rev-parse --verify HEAD~1 >/dev/null 2>&1; then
            BASE=HEAD~1
          else
            BASE=$(git hash-object -t tree /dev/null)
          fi

          # Only root-level .js files (subdirs like snippets/ are excluded by the regex)
          FILES=$(git diff --name-only --diff-filter=AM "$BASE" HEAD \
                  | grep -E '^[^/]+\.js$' || true)

          if [ -z "$FILES" ]; then
            echo "No bookmarklet JS files changed."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo 'matrix={"include":[]}' >> "$GITHUB_OUTPUT"
          else
            echo "Changed bookmarklet files:"
            echo "$FILES"
            MATRIX=$(echo "$FILES" \
              | jq -R -s \
                'split("\n")
                 | map(select(length > 0))
                 | { "include": map({
                     "js_file":     .,
                     "basename":    (.[0:-3]),
                     "readme_file": (.[0:-3] + "_README.md")
                   }) }')
            echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
            echo "has_changes=true"  >> "$GITHUB_OUTPUT"
          fi

  # ── Job 2: Generate a README for each changed bookmarklet (matrix) ────────
  generate-readme:
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      models: read          # Required for GitHub Models inference
    strategy:
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
      max-parallel: 3       # Stay within GitHub Models rate limits
      fail-fast: false      # Generate as many READMEs as possible even on partial failure

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate README via GitHub Models AI
        env:
          GITHUB_TOKEN: ${{ github.token }}
          JS_FILE: ${{ matrix.js_file }}
          README_FILE: ${{ matrix.readme_file }}
        run: |
          python3 - <<'PYEOF'
          import os, json, urllib.request, urllib.error, sys

          token     = os.environ["GITHUB_TOKEN"]
          js_file   = os.environ["JS_FILE"]
          readme    = os.environ["README_FILE"]
          basename  = js_file[:-3]

          # Reuse the existing /document command as the authoritative instructions
          with open(".claude/commands/document_command.md") as f:
              doc_instructions = f.read()

          with open(js_file) as f:
              js_code = f.read()

          system_prompt = (
              "You are a documentation expert for the oaustegard/bookmarklets GitHub repo.\n"
              "Generate README files following the project's documentation standards below.\n"
              "Output ONLY raw Markdown — no preamble, no wrapping code fence.\n\n"
              + doc_instructions
          )

          user_prompt = (
              f"Generate a README for this bookmarklet.\n\n"
              f"Filename : {js_file}\n"
              f"Basename : {basename}\n"
              f"README   : {readme}\n\n"
              f"Source code:\n```javascript\n{js_code}\n```"
          )

          payload = {
              "model": "openai/gpt-4o",
              "messages": [
                  {"role": "system", "content": system_prompt},
                  {"role": "user",   "content": user_prompt},
              ],
              "temperature": 0.3,
              "max_tokens": 2000,
          }

          req = urllib.request.Request(
              "https://models.github.ai/inference/chat/completions",
              data=json.dumps(payload).encode(),
              headers={
                  "Authorization": f"Bearer {token}",
                  "Content-Type":  "application/json",
              },
              method="POST",
          )

          try:
              with urllib.request.urlopen(req) as resp:
                  result = json.loads(resp.read())
          except urllib.error.HTTPError as e:
              print(f"HTTP {e.code}: {e.read().decode()}", file=sys.stderr)
              sys.exit(1)

          content = result["choices"][0]["message"]["content"]
          with open(readme, "w") as f:
              f.write(content)

          print(f"Generated: {readme}")
          print("--- Preview (first 10 lines) ---")
          print("\n".join(content.splitlines()[:10]))
          PYEOF

      - name: Upload README as artifact
        uses: actions/upload-artifact@v4
        with:
          name: readme-${{ matrix.basename }}
          path: ${{ matrix.readme_file }}
          if-no-files-found: error
          retention-days: 1

  # ── Job 3: Commit all generated READMEs in a single commit ───────────────
  commit-readmes:
    needs: [detect-changes, generate-readme]
    if: needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write       # Required to push the commit

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all generated README artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: readme-*
          merge-multiple: true  # Merge all artifacts into a flat directory
          path: .               # Drop into repo root so paths match

      - name: Commit and push READMEs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Rebase first so we don't conflict with commits that landed during matrix execution
          git pull --rebase origin main

          git add *_README.md

          if git diff --cached --quiet; then
            echo "No README changes to commit (files may be identical to existing ones)."
            exit 0
          fi

          CHANGED_LIST=$(git diff --cached --name-only | tr '\n' ' ')
          git commit -m "docs: auto-generate README(s) via GitHub Models AI

Updated: ${CHANGED_LIST}
Triggered by: ${{ github.sha }}"

          git push -u origin main
