name: Auto-Generate Bookmarklet READMEs

on:
  push:
    branches:
      - main
    paths:
      - '*.js'

jobs:
  # ── Job 1: Detect which root-level bookmarklet JS files were added/modified ─
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      files: ${{ steps.diff.outputs.files }}
      has_changes: ${{ steps.diff.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Find changed bookmarklet JS files
        id: diff
        run: |
          if git rev-parse --verify HEAD~1 >/dev/null 2>&1; then
            BASE=HEAD~1
          else
            BASE=$(git hash-object -t tree /dev/null)
          fi

          # Root-level .js only — excludes subdirs like snippets/
          FILES=$(git diff --name-only --diff-filter=AM "$BASE" HEAD \
                  | grep -E '^[^/]+\.js$' || true)

          if [ -z "$FILES" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "files=" >> "$GITHUB_OUTPUT"
          else
            echo "Changed files: $FILES"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            # Newline-delimited list stored as a single output value
            {
              echo 'files<<__EOF__'
              echo "$FILES"
              echo '__EOF__'
            } >> "$GITHUB_OUTPUT"
          fi

  # ── Job 2: Call GitHub Models AI to generate each README ─────────────────
  generate-readmes:
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      models: read
    steps:
      - uses: actions/checkout@v4

      - name: Generate READMEs via GitHub Models
        env:
          GITHUB_TOKEN: ${{ github.token }}
          CHANGED_FILES: ${{ needs.detect-changes.outputs.files }}
        run: |
          for js_file in $CHANGED_FILES; do
            echo "Processing: $js_file"
            python3 .github/scripts/generate_readme.py "$js_file"
          done

      - name: Upload generated READMEs
        uses: actions/upload-artifact@v4
        with:
          name: generated-readmes
          path: '*_README.md'
          if-no-files-found: warn
          retention-days: 1

  # ── Job 3: Commit all generated READMEs in one push ──────────────────────
  commit-readmes:
    needs: [detect-changes, generate-readmes]
    if: needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: generated-readmes
          path: .

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add *_README.md
          if git diff --cached --quiet; then
            echo "No README changes to commit."
            exit 0
          fi
          CHANGED=$(git diff --cached --name-only | tr '\n' ' ')
          git commit -m "docs: auto-generate README(s) via GitHub Models AI

Updated: ${CHANGED}
Triggered by: ${{ github.sha }}"
          git push -u origin main
